<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HW1 - 網格地圖 & 策略評估</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            color: #333;
            background: #fff;
        }
        h2 { margin-top: 30px; }
        h3 { margin-top: 20px; }
        hr { margin: 20px 0; border: none; border-top: 1px solid #aaa; }

        .controls { margin-bottom: 10px; }
        .controls input[type="number"] {
            width: 50px;
            padding: 3px 5px;
            font-size: 14px;
        }
        button {
            padding: 4px 14px;
            font-size: 14px;
            cursor: pointer;
        }

        .grid-row { display: flex; }
        .grid-cell {
            width: 45px; height: 45px;
            border: 1px solid #333;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            font-size: 14px;
            user-select: none;
            margin-right: -1px; margin-bottom: -1px;
        }
        .grid-cell:hover { background-color: #eee; }
        .grid-cell.start { background-color: #28a745; color: white; }
        .grid-cell.end { background-color: #dc3545; color: white; }
        .grid-cell.obstacle { background-color: #999; color: #999; }
        .grid-cell.path-cell { background-color: #ffc107; }

        .result-container { display: flex; gap: 40px; margin-top: 20px; flex-wrap: wrap; }
        .matrix-wrapper { display: flex; flex-direction: column; align-items: flex-start; }
        .matrix-title { font-weight: bold; margin-bottom: 8px; font-size: 16px; }

        .result-cell {
            width: 50px; height: 50px;
            border: 1px solid #999;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px;
            margin-right: -1px; margin-bottom: -1px;
            background-color: #f5f5f5;
            font-weight: bold;
        }
        .result-cell.obstacle-cell { background-color: #999; color: #fff; }
        .result-cell.end-cell { background-color: #dc3545; color: #fff; }
        .result-cell.start-cell { background-color: #28a745; color: #fff; }
        .result-cell.path-highlight { background-color: #ffc107; }

        .arrow { font-size: 20px; }

        #info-text { font-weight: bold; color: #0056b3; margin-top: 10px; }
        .legend { font-size: 14px; color: #555; margin-bottom: 5px; }
        .section-btns { margin-top: 15px; }
        .section-btns button { margin-right: 8px; }
        .info-bar { margin-top: 12px; font-size: 13px; color: #555; }
        .info-bar span { margin-right: 20px; }
    </style>
</head>
<body>
    <h2>作業內容</h2>

    <h3>HW1-1: 網格地圖開發</h3>
    <div class="controls">
        <label>Generate n x n Square</label><br><br>
        <label for="n-input">Enter a number between 5 and 10: </label>
        <input type="number" id="n-input" min="5" max="10" value="5">
        <button onclick="generateSquare()">Generate Square</button>
    </div>

    <div id="grid-section" style="display:none;">
        <h3 id="grid-title"></h3>
        <p class="legend">1. Click on a cell to set up the start grid as <span style="color:#28a745;font-weight:bold;">green</span> or the end grid as <span style="color:#dc3545;font-weight:bold;">red</span>. Obstacles will be <span style="color:#999;font-weight:bold;">gray</span>.</p>
        <div id="grid-container"></div>
        <p id="info-text"></p>
        <div class="section-btns">
            <button id="evaluate-btn" onclick="evaluatePolicy()" style="display:none;">隨機策略 + 策略評估 (HW1-2)</button>
            <button id="vi-btn" onclick="runValueIteration()" style="display:none;">價值迭代 + 策略萃取 (HW1-3)</button>
        </div>
    </div>

    <hr>

    <div id="pe-result" style="display:none;">
        <h3>HW1-2: 策略顯示與價值評估 (Policy Evaluation)</h3>
        <div class="result-container">
            <div class="matrix-wrapper">
                <div class="matrix-title">Value Matrix</div>
                <div id="pe-value-matrix"></div>
            </div>
            <div class="matrix-wrapper">
                <div class="matrix-title">Policy Matrix</div>
                <div id="pe-policy-matrix"></div>
            </div>
        </div>
        <div class="info-bar" id="pe-info"></div>
    </div>

    <div id="vi-result" style="display:none;">
        <h3>HW1-3: 價值迭代與最佳路徑 (Value Iteration)</h3>
        <div class="result-container">
            <div class="matrix-wrapper">
                <div class="matrix-title">Value Matrix (Optimal)</div>
                <div id="vi-value-matrix"></div>
            </div>
            <div class="matrix-wrapper">
                <div class="matrix-title">Policy Matrix (Optimal)</div>
                <div id="vi-policy-matrix"></div>
            </div>
        </div>
        <div class="info-bar" id="vi-info"></div>
    </div>

<script>
    var n = 0;
    var startPos = null;
    var endPos = null;
    var obstacles = [];
    var clicks = 0;
    var maxObstacles = 0;

    var ACTIONS = ['U', 'D', 'L', 'R'];
    var GAMMA = 0.9;
    var REWARD_STEP = -1;
    var REWARD_GOAL = 10;
    var THETA = 1e-6;
    var MAX_ITER = 1000;

    /* ─── 工具函數 ─── */
    function key(r, c) { return r + ',' + c; }

    function getNext(r, c, action) {
        if (action === 'U') return [r - 1, c];
        if (action === 'D') return [r + 1, c];
        if (action === 'L') return [r, c - 1];
        if (action === 'R') return [r, c + 1];
        return [r, c];
    }

    function isObstacle(r, c) {
        for (var i = 0; i < obstacles.length; i++) {
            if (obstacles[i][0] === r && obstacles[i][1] === c) return true;
        }
        return false;
    }

    function isEnd(r, c) {
        return endPos && endPos[0] === r && endPos[1] === c;
    }

    function isStart(r, c) {
        return startPos && startPos[0] === r && startPos[1] === c;
    }

    function clampNext(r, c, action) {
        var next = getNext(r, c, action);
        var nr = next[0], nc = next[1];
        if (nr < 0 || nr >= n || nc < 0 || nc >= n || isObstacle(nr, nc)) {
            return [r, c];
        }
        return [nr, nc];
    }

    /* ─── 生成網格 ─── */
    function generateSquare() {
        n = parseInt(document.getElementById('n-input').value);
        if (isNaN(n) || n < 5 || n > 10) {
            alert('請輸入 5 到 10 之間的數字！');
            return;
        }
        startPos = null; endPos = null; obstacles = []; clicks = 0;
        maxObstacles = n - 2;

        document.getElementById('grid-section').style.display = 'block';
        document.getElementById('grid-title').innerText = n + ' x ' + n + ' Square:';
        document.getElementById('evaluate-btn').style.display = 'none';
        document.getElementById('vi-btn').style.display = 'none';
        document.getElementById('pe-result').style.display = 'none';
        document.getElementById('vi-result').style.display = 'none';
        updateInfo();

        var container = document.getElementById('grid-container');
        container.innerHTML = '';
        var num = 1;
        for (var r = 0; r < n; r++) {
            var row = document.createElement('div');
            row.className = 'grid-row';
            for (var c = 0; c < n; c++) {
                var cell = document.createElement('div');
                cell.className = 'grid-cell';
                cell.id = 'cell-' + r + '-' + c;
                cell.dataset.r = r;
                cell.dataset.c = c;
                cell.innerText = num++;
                (function(cell, r, c) {
                    cell.onclick = function() { handleClick(cell, r, c); };
                })(cell, r, c);
                row.appendChild(cell);
            }
            container.appendChild(row);
        }
    }

    function updateInfo() {
        var info = document.getElementById('info-text');
        if (clicks === 0) {
            info.innerText = 'Step 1: 點擊設定 Start（綠色）';
        } else if (clicks === 1) {
            info.innerText = 'Step 2: 點擊設定 End（紅色）';
        } else if (obstacles.length < maxObstacles) {
            info.innerText = 'Step 3: 點擊設定障礙物（灰色），還需 ' + (maxObstacles - obstacles.length) + ' 個（可再次點擊取消）';
        } else {
            info.innerText = '設定完成！請點擊下方按鈕進行評估。';
        }
    }

    function handleClick(cell, r, c) {
        if (clicks === 0) {
            startPos = [r, c];
            cell.classList.add('start');
            cell.innerText = 'S';
            clicks++;
            updateInfo();
            return;
        }
        if (clicks === 1) {
            if (cell.classList.contains('start')) return;
            endPos = [r, c];
            cell.classList.add('end');
            cell.innerText = 'E';
            clicks++;
            updateInfo();
            return;
        }
        if (clicks >= 2) {
            if (cell.classList.contains('start') || cell.classList.contains('end')) return;
            if (cell.classList.contains('obstacle')) {
                cell.classList.remove('obstacle');
                cell.innerText = r * n + c + 1;
                obstacles = obstacles.filter(function(o) { return !(o[0] === r && o[1] === c); });
            } else if (obstacles.length < maxObstacles) {
                cell.classList.add('obstacle');
                cell.innerText = '';
                obstacles.push([r, c]);
            }
            if (obstacles.length >= maxObstacles) {
                document.getElementById('evaluate-btn').style.display = 'inline-block';
                document.getElementById('vi-btn').style.display = 'inline-block';
            } else {
                document.getElementById('evaluate-btn').style.display = 'none';
                document.getElementById('vi-btn').style.display = 'none';
            }
            updateInfo();
        }
    }

    /* ═══════════════════════════════════════════════
       HW1-2: 策略評估 (Policy Evaluation)
       隨機策略 Stochastic: pi(a|s) = 0.25
       V(s) = Σ pi(a|s) * [R(s,a) + γ·V(s')]
       ═══════════════════════════════════════════════ */
    function evaluatePolicy() {
        var V = {};
        for (var r = 0; r < n; r++)
            for (var c = 0; c < n; c++)
                V[key(r, c)] = 0.0;

        var prob = 1.0 / ACTIONS.length;
        var iteration = 0;

        for (iteration = 0; iteration < MAX_ITER; iteration++) {
            var delta = 0;
            var Vnew = {};
            for (var k in V) Vnew[k] = V[k];

            for (var r = 0; r < n; r++) {
                for (var c = 0; c < n; c++) {
                    if (isEnd(r, c) || isObstacle(r, c)) continue;

                    var weightedSum = 0;
                    for (var ai = 0; ai < ACTIONS.length; ai++) {
                        var ns = clampNext(r, c, ACTIONS[ai]);
                        var reward = isEnd(ns[0], ns[1]) ? REWARD_GOAL : REWARD_STEP;
                        weightedSum += prob * (reward + GAMMA * V[key(ns[0], ns[1])]);
                    }
                    var vOld = V[key(r, c)];
                    Vnew[key(r, c)] = weightedSum;
                    delta = Math.max(delta, Math.abs(vOld - weightedSum));
                }
            }
            V = Vnew;
            if (delta < THETA) break;
        }

        // 隨機策略（用於顯示）
        var policy = {};
        for (var r = 0; r < n; r++)
            for (var c = 0; c < n; c++)
                policy[key(r, c)] = (isEnd(r, c) || isObstacle(r, c)) ? null : ACTIONS[Math.floor(Math.random() * 4)];

        renderResults('pe', V, policy, [], iteration + 1);
        document.getElementById('pe-result').style.display = 'block';
        document.getElementById('evaluate-btn').innerText = '重新隨機策略 + 策略評估 (HW1-2)';
    }

    /* ═══════════════════════════════════════════════
       HW1-3: 價值迭代 (Value Iteration)
       V(s) = max_a [R(s,a) + γ·V(s')]
       策略萃取: π*(s) = argmax_a [R(s,a) + γ·V*(s')]
       ═══════════════════════════════════════════════ */
    function runValueIteration() {
        var V = {};
        for (var r = 0; r < n; r++)
            for (var c = 0; c < n; c++)
                V[key(r, c)] = 0.0;

        var iteration = 0;

        // Value Iteration: Max
        for (iteration = 0; iteration < MAX_ITER; iteration++) {
            var delta = 0;
            var Vnew = {};
            for (var k in V) Vnew[k] = V[k];

            for (var r = 0; r < n; r++) {
                for (var c = 0; c < n; c++) {
                    if (isEnd(r, c) || isObstacle(r, c)) continue;

                    var maxVal = -Infinity;
                    for (var ai = 0; ai < ACTIONS.length; ai++) {
                        var ns = clampNext(r, c, ACTIONS[ai]);
                        var reward = isEnd(ns[0], ns[1]) ? REWARD_GOAL : REWARD_STEP;
                        var val = reward + GAMMA * V[key(ns[0], ns[1])];
                        if (val > maxVal) maxVal = val;
                    }
                    var vOld = V[key(r, c)];
                    Vnew[key(r, c)] = maxVal;
                    delta = Math.max(delta, Math.abs(vOld - maxVal));
                }
            }
            V = Vnew;
            if (delta < THETA) break;
        }

        // Policy Extraction: Argmax
        var policy = {};
        for (var r = 0; r < n; r++) {
            for (var c = 0; c < n; c++) {
                if (isEnd(r, c) || isObstacle(r, c)) { policy[key(r, c)] = null; continue; }
                var bestA = null, bestVal = -Infinity;
                for (var ai = 0; ai < ACTIONS.length; ai++) {
                    var ns = clampNext(r, c, ACTIONS[ai]);
                    var reward = isEnd(ns[0], ns[1]) ? REWARD_GOAL : REWARD_STEP;
                    var val = reward + GAMMA * V[key(ns[0], ns[1])];
                    if (val > bestVal) { bestVal = val; bestA = ACTIONS[ai]; }
                }
                policy[key(r, c)] = bestA;
            }
        }

        // Path Extraction
        var path = [];
        var cur = [startPos[0], startPos[1]];
        var visited = {};
        while (!isEnd(cur[0], cur[1]) && path.length < n * n) {
            var k2 = key(cur[0], cur[1]);
            if (visited[k2]) break;
            visited[k2] = true;
            path.push([cur[0], cur[1]]);
            var a = policy[k2];
            if (!a) break;
            var ns = clampNext(cur[0], cur[1], a);
            if (ns[0] === cur[0] && ns[1] === cur[1]) break;
            cur = ns;
        }
        if (isEnd(cur[0], cur[1])) path.push([cur[0], cur[1]]);

        // 在主網格上標路徑
        clearPathHighlight();
        for (var i = 0; i < path.length; i++) {
            var el = document.getElementById('cell-' + path[i][0] + '-' + path[i][1]);
            if (el && !el.classList.contains('start') && !el.classList.contains('end') && !el.classList.contains('obstacle')) {
                el.classList.add('path-cell');
            }
        }

        renderResults('vi', V, policy, path, iteration + 1);
        document.getElementById('vi-info').innerHTML += '<span>最佳路徑長度: ' + path.length + ' 步</span>';
        document.getElementById('vi-result').style.display = 'block';
        document.getElementById('vi-btn').innerText = '重新價值迭代 + 策略萃取 (HW1-3)';
    }

    function clearPathHighlight() {
        var cells = document.querySelectorAll('.grid-cell.path-cell');
        for (var i = 0; i < cells.length; i++) cells[i].classList.remove('path-cell');
    }

    /* ─── 渲染結果矩陣 ─── */
    function renderResults(prefix, V, policy, path, iterations) {
        var pathSet = {};
        for (var i = 0; i < path.length; i++) pathSet[key(path[i][0], path[i][1])] = true;

        var arrowMap = { 'U': '↑', 'D': '↓', 'L': '←', 'R': '→' };

        // Value Matrix
        var vContainer = document.getElementById(prefix + '-value-matrix');
        vContainer.innerHTML = '';
        for (var r = 0; r < n; r++) {
            var row = document.createElement('div');
            row.className = 'grid-row';
            for (var c = 0; c < n; c++) {
                var cell = document.createElement('div');
                cell.className = 'result-cell';
                var k2 = key(r, c);
                if (isObstacle(r, c)) {
                    cell.classList.add('obstacle-cell');
                    cell.innerText = 'X';
                } else if (isEnd(r, c)) {
                    cell.classList.add('end-cell');
                    cell.innerText = '0.00';
                } else if (isStart(r, c)) {
                    cell.classList.add('start-cell');
                    cell.innerText = V[k2].toFixed(2);
                } else {
                    cell.innerText = V[k2].toFixed(2);
                    if (pathSet[k2]) cell.classList.add('path-highlight');
                }
                row.appendChild(cell);
            }
            vContainer.appendChild(row);
        }

        // Policy Matrix
        var pContainer = document.getElementById(prefix + '-policy-matrix');
        pContainer.innerHTML = '';
        for (var r = 0; r < n; r++) {
            var row = document.createElement('div');
            row.className = 'grid-row';
            for (var c = 0; c < n; c++) {
                var cell = document.createElement('div');
                cell.className = 'result-cell';
                var k2 = key(r, c);
                var act = policy[k2];
                if (isObstacle(r, c)) {
                    cell.classList.add('obstacle-cell');
                    cell.innerText = 'X';
                } else if (isEnd(r, c)) {
                    cell.classList.add('end-cell');
                    cell.innerText = 'END';
                } else if (isStart(r, c)) {
                    cell.classList.add('start-cell');
                    cell.innerHTML = '<span class="arrow">' + (arrowMap[act] || '?') + '</span>';
                } else {
                    cell.innerHTML = '<span class="arrow">' + (arrowMap[act] || '?') + '</span>';
                    if (pathSet[k2]) cell.classList.add('path-highlight');
                }
                row.appendChild(cell);
            }
            pContainer.appendChild(row);
        }

        // Info
        document.getElementById(prefix + '-info').innerHTML =
            '<span><b>γ = ' + GAMMA + '</b></span>' +
            '<span>收斂迭代: ' + iterations + ' 次</span>';
    }
</script>
</body>
</html>
